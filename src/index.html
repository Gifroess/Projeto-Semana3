<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comme:wght@200&family=Montserrat:wght@100;300;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <title>Lista de Tarefas</title>

</head>
<body>
  
  <h1>Minhas Tarefas</h1>

  <div id="app">
    <div class="tema-container" ><button id="tema" >🌙</button></div>
  
    <p style="margin-top: 0;" id="estatisticas"></p>
    <input type="text" placeholder="Digite uma tarefa..." id="tarefa" />
    <select class="entrada" id="prioridade" aria-label="Prioridade">
        <option value="" disabled selected hidden>Prioridade.</option>
        <option value="Baixa">Baixa</option>
        <option value="Média">Média</option>
        <option value="Alta">Alta</option>
    </select>
    <input class="entrada" type="date" placeholder="Prazo" id="prazo"/>
    <button id="Adicionar"> Adicionar </button>

    <ul> </ul>

    <div class="divBotao">
    <button class="botao" id="todas">Todas</button>
    <button class="botao" id="pendentes">Pendentes</button>
    <button class="botao" id="concluidas">Concluídas</button>
    </div>

  </div>

  <script src="../build/index.js"></script>

</body>
</html>
